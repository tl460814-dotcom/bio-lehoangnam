<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;

    /* NỀN ẢNH */

/* Lớp tối nhẹ cho rõ chữ */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Avatar */
.avatar {
    width: 130px;

    border: 3px solid #00ffff;
    box-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff;

/* Xoay */

    100% { transform: rotate(360deg); }

/* Tên */

    text-shadow: 0 0 15px #00ffff;
}

/* Caption */
.caption {
    font-size: 13px;

    margin-bottom: 15px;
}

/* Link gaming */
.link {
    display: block;
    margin: 12px auto;
    padding: 12px;

    border-radius: 12px;
    text-decoration: none;
    color: white;

    background: linear-gradient(45deg, #00ffff, #0066ff);

    transition: 0.3s;

.link:hover {
    transform: scale(1.08);

/* Chủ quyền */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
}

/* Hiệu ứng rơi */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<div class="overlay"></div>
<canvas id="bg"></canvas>

<!-- Nhạc -->

<div class="caption">
Bán DPI config hỗ trợ kéo tâm (ADR + iOS) | Mod ib

<div class="footer">© le hoang nam</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 1.5
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffff";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y += p.speed;

        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
