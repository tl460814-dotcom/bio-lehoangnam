<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lê Hoàng Nam - Bio Link</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --deep-purple: #1a1a2e;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Nền động */
        .background-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            z-index: -1;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .bio-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 25px;
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--neon-blue);
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-item:hover {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--neon-blue);
            transform: translateY(-3px);
        }

        .link-item i {
            margin-right: 12px;
            font-size: 20px;
            color: var(--neon-blue);
        }

        /* Music Player */
        .music-player {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .play-btn {
            background: var(--neon-blue);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .music-title { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="background-wrap"></div>
    <canvas id="snow-canvas"></canvas>

    <div class="bio-card">
        <!-- Ảnh đại diện của bạn -->
        <img src="https://i.imgur.com/8RK9u7y.png" alt="Avatar" class="avatar">
        
        <h1>Lê Hoàng Nam</h1>

        <div class="links">
            <a href="https://www.facebook.com/share/18UcuFoooA/?mibextid=wwXIfr" class="link-item" target="_blank">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            
            <a href="https://zalo.me/0373960765" class="link-item" target="_blank">
                <i class="fas fa-comment"></i> Zalo: 0373960765
            </a>

            <a href="https://discord.gg/4gsmDeAe4" class="link-item" target="_blank">
                <i class="fab fa-discord"></i> Discord
            </a>

            <a href="https://m.me/j/AbaN07D8wQV4sLNQ/" class="link-item" target="_blank">
                <i class="fab fa-facebook-messenger"></i> Box Messenger
            </a>
        </div>

        <div class="music-player">
            <span class="music-title">Favorite Song</span>
            <button class="play-btn" id="playToggle"><i class="fas fa-play" id="playIcon"></i></button>
            <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        </div>
    </div>

    <script>
        // Hiệu ứng tuyết
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let snows = [];

        class Snowflake {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 1 + 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > height) this.y = -5;
            }
            draw() {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) snows.push(new Snowflake());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            snows.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Music
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('playToggle');
        const icon = document.getElementById('playIcon');

        btn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                icon.className = 'fas fa-pause';
            } else {
                music.pause();
                icon.className = 'fas fa-play';
            }
        });
    </script>
</body>
</html>
