<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Lê Hoàng Nam - Gaming Profile</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glow: 0 0 20px var(--primary);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* Đã chuyển đổi link nền sang link trực tiếp */
            background: #000 url('https://i.ibb.co/whLm96NV/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(15px);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: var(--glow);
        }

        /* Avatar Aura Gaming */
        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary);
            object-fit: cover;
            position: relative;
            z-index: 2;
        }

        .avatar-aura {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--primary));
            border-radius: 50%;
            z-index: 1;
            animation: rotateAura 2.5s linear infinite;
        }

        @keyframes rotateAura {
            0% { transform: rotate(0deg); filter: blur(5px); }
            100% { transform: rotate(360deg); filter: blur(10px); }
        }

        h1 {
            font-size: 24px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio-text { font-size: 14px; color: #ddd; margin-bottom: 25px; line-height: 1.5; }

        .btn {
            display: block;
            padding: 13px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.03);
        }

        .music-box {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        audio { width: 100%; height: 30px; filter: invert(1); margin-top: 10px; }

        #snow-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="card">
        <div class="avatar-wrapper">
            <div class="avatar-aura"></div>
            <!-- Đã chuyển đổi link avatar sang link trực tiếp -->
            <img src="https://i.ibb.co/Z6b5Pk6h/avt.jpg" alt="Admin Nam" class="avatar-img">
        </div>

        <h1>Admin Lê Hoàng Nam</h1>
        <p class="bio-text">
            🎯 <b>TRÙM CONFIG FF PRO</b> 🎯<br>
            DPI Config hỗ trợ kéo tâm tận tình<br>
            Bám đầu cực gắt - Mod FF chuyên nghiệp!
        </p>

        <div class="links">
            <a href="https://www.facebook.com/share/1AVy5YknoB/" class="btn" target="_blank">🌐 Facebook Cá Nhân</a>
            <a href="https://m.me/j/AbaN07D8wQV4sLNQ/" class="btn" target="_blank">💬 Messenger Box</a>
            <a href="https://zalo.me/0373960765" class="btn" target="_blank">📞 Zalo: 0373960765</a>
            <a href="https://discord.gg/4gsmDeAe4" class="btn" target="_blank">🎧 Discord Server</a>
        </div>

        <div class="music-box">
            <p style="font-size: 11px;">🎵 Mưa Đợi Chờ Đêm (Official)</p>
            <!-- Sử dụng link nhạc trực tuyến của bạn -->
            <audio id="player" controls loop>
                <source src="https://noisy-azure-ar68lmtmkv.edgeone.app/" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for(let i = 0; i < 60; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2 + 1,
                v: Math.random() * 1.2 + 0.5
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00f2ff";
            ctx.beginPath();
            for(let p of particles) {
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            }
            ctx.fill();
            for(let p of particles) {
                p.y += p.v;
                if(p.y > canvas.height) p.y = -10;
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
