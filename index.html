<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Lê Hoàng Nam - Gaming Bio</title>
    <style>
        :root {
            --primary-color: #00f2ff;
            --secondary-color: #7000ff;
            --text-color: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://ibb.co/whLm96NV') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Hiệu ứng tuyết rơi phong cách Gaming */
        .snowflakes {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            object-fit: cover;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px var(--primary-color); }
            50% { box-shadow: 0 0 25px var(--secondary-color); }
            100% { box-shadow: 0 0 5px var(--primary-color); }
        }

        h1 { font-size: 24px; margin-bottom: 5px; color: var(--primary-color); }
        .caption { font-size: 14px; margin-bottom: 25px; line-height: 1.5; color: #ccc; }

        .links-container { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            text-decoration: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary-color);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--primary-color);
        }

        .music-player {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>

            <a href="https://discord.gg/4gsmDeAe4" class="btn" target="_blank">🎧 Cộng Đồng Discord</a>

            🎵 Đang phát: TIKER_Mưa Đợi Chờ Đêm...
            <audio controls style="width: 100%; height: 30px; margin-top: 10px;">

</body>
